name: CI

# Run Lua unit tests for the addon against the published GHCR test image.
#
# This workflow does not rebuild the image. It pulls the latest published
# testing image, executes the suite from Testing/Tests, and publishes the
# JUnit summary directly in the GitHub Actions UI.

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute test image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ellesmereui-tests:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull test runner image
        run: |
          docker pull "${{ steps.image.outputs.name }}"

      - name: Run unit tests in container
        id: unit-tests
        shell: bash
        run: |
          mkdir -p Testing/TestResults
          set +e
          docker run --rm -v "$PWD:/workspace" -w /workspace "${{ steps.image.outputs.name }}" -f Testing/.busted Testing/Tests | tee Testing/TestResults/busted.log
          plain_exit=${PIPESTATUS[0]}
          docker run --rm -v "$PWD:/workspace" -w /workspace "${{ steps.image.outputs.name }}" -f Testing/.busted -o junit -Xoutput Testing/TestResults/junit.xml Testing/Tests
          junit_exit=$?
          exit_code=$plain_exit
          if [ "$exit_code" -eq 0 ] && [ "$junit_exit" -ne 0 ]; then
            exit_code=$junit_exit
          fi
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: Testing/TestResults/junit.xml
          detailed_summary: true
          include_passed: true
          require_tests: true

      - name: Fail workflow on test errors
        if: always() && steps.unit-tests.outputs.exit_code != '0'
        run: exit 1
