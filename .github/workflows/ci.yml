name: CI

# Continuous integration workflow for running local Lua unit tests.
# This workflow is intentionally separated from the release workflow,
# because it validates code changes on every branch and pull request.

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Lua 5.1 and LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 lua5.1-dev luarocks

      - name: Install busted for Lua 5.1
        run: |
          luarocks --lua-version=5.1 install busted

      - name: Run unit tests
        working-directory: ${{ github.workspace }}
        run: |
          busted --helper tests/bootstrap.lua tests
