name: Publish Test Image

# Build and publish the reusable Lua test runner image.
#
# The CI workflow consumes this image directly from GHCR, so rebuilds are only
# needed when the container definition or this publish workflow changes.

on:
  push:
    branches:
      - main
      - master
    paths:
      - Testing/Containerfile
      - .github/workflows/publish-test-image.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ellesmereui-tests" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Testing/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}